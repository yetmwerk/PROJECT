services:
  mysql:
    image: mysql:8.0
    container_name: visitor-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: visitor_db
    ports:
      - "3306:3306"
    volumes:
      - visitor_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  visitor_mysql_data:
